function colorTextoSobreFondo(hex) {
  const limpio = hex.replace("#", "");
  const r = parseInt(limpio.substring(0, 2), 16);
  const g = parseInt(limpio.substring(2, 4), 16);
  const b = parseInt(limpio.substring(4, 6), 16);
  const brillo = (r * 299 + g * 587 + b * 114) / 1000;
  return brillo > 150 ? "#111111" : "#ffffff";
}

function inicializarSelector() {
  elementos.selector.innerHTML = "";

  hominidos.forEach((hominido, index) => {
    const boton = document.createElement("button");
    boton.type = "button";
    boton.className = "tarjeta-btn";
    boton.style.borderLeftColor = hominido.color;
    boton.setAttribute("aria-label", `Ver ficha de ${hominido.nombre}`);

    boton.innerHTML = `
      <strong>${hominido.nombre}</strong>
      <span>${hominido.cronologia} · ${hominido.idea}</span>
    `;

    boton.addEventListener("click", () => {
      indiceActual = index;
      pararAudio();
      actualizarFicha();
    });

    elementos.selector.appendChild(boton);
  });
}

function actualizarSelectorActivo() {
  const botones = elementos.selector.querySelectorAll(".tarjeta-btn");

  botones.forEach((boton, index) => {
    const activo = index === indiceActual;
    boton.classList.toggle("activa", activo);
    boton.setAttribute("aria-current", activo ? "true" : "false");
  });
}

function actualizarFicha() {
  const hominido = hominidos[indiceActual];
  const textoCabecera = colorTextoSobreFondo(hominido.color);

  elementos.panelCabecera.style.background = hominido.color;
  elementos.panelCabecera.style.color = textoCabecera;

  elementos.nombre.textContent = hominido.nombre;
  elementos.descripcionCorta.textContent = hominido.descripcionCorta;
  elementos.cronologia.textContent = hominido.cronologia;
  elementos.lugar.textContent = hominido.lugar;
  elementos.idea.textContent = hominido.idea;

  elementos.imagenCraneo.src = hominido.imagen;
  elementos.imagenCraneo.alt = hominido.imagenAlt;
  elementos.imagenCraneo.onerror = () => {
    elementos.imagenCraneo.onerror = null;
    elementos.imagenCraneo.src = crearImagenFallback(hominido);
  };

  elementos.captionCraneo.textContent = hominido.captionCraneo;
  elementos.descripcionTactil.textContent = hominido.descripcionTactil;
  elementos.capacidadCraneal.textContent = hominido.capacidadCraneal;
  elementos.rasgosClave.textContent = hominido.rasgosClave;
  elementos.curiosidad.textContent = hominido.curiosidad;
  elementos.textoAudio.textContent = hominido.textoAudio;
  elementos.textoFacil.textContent = hominido.textoFacil;
  elementos.pregunta.textContent = hominido.pregunta;
  elementos.respuesta.textContent = hominido.respuesta;

  elementos.iconoCapacidad.textContent = "🧠";
  elementos.iconoCapacidad.style.background = hominido.color;
  elementos.iconoCapacidad.style.color = textoCabecera;

  elementos.iconoRasgos.textContent = "✋";
  elementos.iconoRasgos.style.background = hominido.color;
  elementos.iconoRasgos.style.color = textoCabecera;

  elementos.iconoCuriosidad.textContent = "✨";
  elementos.iconoCuriosidad.style.background = hominido.color;
  elementos.iconoCuriosidad.style.color = textoCabecera;

  elementos.claves.innerHTML = "";
  hominido.claves.forEach((clave) => {
    const li = document.createElement("li");
    li.textContent = clave;
    elementos.claves.appendChild(li);
  });

  actualizarSelectorActivo();
}

function crearTablaResumen() {
  elementos.tablaResumen.innerHTML = "";

  hominidos.forEach((hominido) => {
    const fila = document.createElement("tr");

    const celdaNombre = document.createElement("td");
    celdaNombre.innerHTML = `
      <span class="color-pill" style="background:${hominido.color}"></span>
      <strong>${hominido.nombre}</strong>
    `;

    const celdaCronologia = document.createElement("td");
    celdaCronologia.textContent = hominido.cronologia;

    const celdaLugar = document.createElement("td");
    celdaLugar.textContent = hominido.lugar;

    const celdaIdea = document.createElement("td");
    celdaIdea.textContent = hominido.ideaResumen;

    fila.appendChild(celdaNombre);
    fila.appendChild(celdaCronologia);
    fila.appendChild(celdaLugar);
    fila.appendChild(celdaIdea);

    elementos.tablaResumen.appendChild(fila);
  });
}

function obtenerTextoParaAudio(tipo) {
  const hominido = hominidos[indiceActual];

  const textos = {
    craneo: hominido.captionCraneo,
    tactil: hominido.descripcionTactil,
    datos: hominido.claves.join(". "),
    capacidad: `Capacidad craneal: ${hominido.capacidadCraneal}`,
    rasgos: hominido.rasgosClave,
    curiosidad: hominido.curiosidad,
    pregunta: `${hominido.pregunta} ${hominido.respuesta}`,
    completo: lecturaFacilActiva ? hominido.textoFacil : hominido.textoAudio
  };

  return textos[tipo] || textos.completo;
}

function cargarVoces() {
  if (!("speechSynthesis" in window)) return;

  vocesDisponibles = window.speechSynthesis.getVoices();

  elementos.selectorVoz.innerHTML = `<option value="">Voz automática</option>`;

  vocesDisponibles
    .filter((voz) => voz.lang.toLowerCase().startsWith("es"))
    .forEach((voz, index) => {
      const option = document.createElement("option");
      option.value = voz.name;
      option.textContent = `${voz.name} · ${voz.lang}`;
      elementos.selectorVoz.appendChild(option);
    });
}

function obtenerVozSeleccionada() {
  if (!("speechSynthesis" in window)) return null;

  const nombreVoz = elementos.selectorVoz.value;

  if (nombreVoz) {
    return vocesDisponibles.find((voz) => voz.name === nombreVoz) || null;
  }

  return (
    vocesDisponibles.find((voz) => voz.lang === "es-ES") ||
    vocesDisponibles.find((voz) => voz.lang.toLowerCase().startsWith("es")) ||
    null
  );
}

function hablar(tipo = "completo") {
  if (!("speechSynthesis" in window)) {
    elementos.estadoAudio.textContent = "Audio no disponible en este navegador";
    return;
  }

  pararAudio();

  const texto = obtenerTextoParaAudio(tipo);
  const utterance = new SpeechSynthesisUtterance(texto);

  utterance.lang = "es-ES";
  utterance.rate = velocidadLentaActiva ? 0.78 : 0.98;
  utterance.pitch = 1;
  utterance.volume = 1;

  const voz = obtenerVozSeleccionada();
  if (voz) utterance.voice = voz;

  utterance.onstart = () => {
    elementos.estadoAudio.textContent = "Audio reproduciéndose";
    elementos.pausarBtn.textContent = "⏸ Pausar";
  };

  utterance.onend = () => {
    elementos.estadoAudio.textContent = "Audio detenido";
    elementos.pausarBtn.textContent = "⏸ Pausar";
  };

  utterance.onerror = () => {
    elementos.estadoAudio.textContent = "No se pudo reproducir el audio";
    elementos.pausarBtn.textContent = "⏸ Pausar";
  };

  window.speechSynthesis.speak(utterance);
}

function pausarOReanudarAudio() {
  if (!("speechSynthesis" in window)) return;

  if (window.speechSynthesis.speaking && !window.speechSynthesis.paused) {
    window.speechSynthesis.pause();
    elementos.estadoAudio.textContent = "Audio pausado";
    elementos.pausarBtn.textContent = "▶ Reanudar";
    return;
  }

  if (window.speechSynthesis.paused) {
    window.speechSynthesis.resume();
    elementos.estadoAudio.textContent = "Audio reproduciéndose";
    elementos.pausarBtn.textContent = "⏸ Pausar";
  }
}

function pararAudio() {
  if (!("speechSynthesis" in window)) return;

  window.speechSynthesis.cancel();
  elementos.estadoAudio.textContent = "Audio detenido";
  elementos.pausarBtn.textContent = "⏸ Pausar";
}

function activarLecturaFacil() {
  lecturaFacilActiva = !lecturaFacilActiva;
  document.body.classList.toggle("modo-facil", lecturaFacilActiva);
  elementos.lecturaFacilBtn.classList.toggle("activo", lecturaFacilActiva);
  pararAudio();
}

function activarLetraGrande() {
  document.body.classList.toggle("letra-grande");
  elementos.letraGrandeBtn.classList.toggle("activo");
}

function activarContraste() {
  document.body.classList.toggle("alto-contraste");
  elementos.contrasteBtn.classList.toggle("activo");
}

function cambiarVelocidad(lenta) {
  velocidadLentaActiva = lenta;

  elementos.velocidadNormalBtn.classList.toggle("activo", !lenta);
  elementos.velocidadLentaBtn.classList.toggle("activo", lenta);

  pararAudio();
}

function irAnterior() {
  indiceActual = (indiceActual - 1 + hominidos.length) % hominidos.length;
  pararAudio();
  actualizarFicha();
}

function irSiguiente() {
  indiceActual = (indiceActual + 1) % hominidos.length;
  pararAudio();
  actualizarFicha();
}

function asignarEventos() {
  elementos.anteriorBtn.addEventListener("click", irAnterior);
  elementos.siguienteBtn.addEventListener("click", irSiguiente);

  elementos.escucharBtn.addEventListener("click", () => hablar("completo"));
  elementos.pausarBtn.addEventListener("click", pausarOReanudarAudio);
  elementos.pararBtn.addEventListener("click", pararAudio);

  elementos.lecturaFacilBtn.addEventListener("click", activarLecturaFacil);
  elementos.letraGrandeBtn.addEventListener("click", activarLetraGrande);
  elementos.contrasteBtn.addEventListener("click", activarContraste);

  elementos.velocidadNormalBtn.addEventListener("click", () => cambiarVelocidad(false));
  elementos.velocidadLentaBtn.addEventListener("click", () => cambiarVelocidad(true));

  document.querySelectorAll("[data-audio]").forEach((boton) => {
    boton.addEventListener("click", () => {
      const tipo = boton.getAttribute("data-audio");
      hablar(tipo);
    });
  });

  document.addEventListener("keydown", (event) => {
    if (event.key === "ArrowLeft") irAnterior();
    if (event.key === "ArrowRight") irSiguiente();
    if (event.key === "Escape") pararAudio();
  });

  if ("speechSynthesis" in window) {
    window.speechSynthesis.onvoiceschanged = cargarVoces;
  }
}

function iniciarWeb() {
  inicializarSelector();
  crearTablaResumen();
  cargarVoces();
  asignarEventos();
  actualizarFicha();
}

document.addEventListener("DOMContentLoaded", iniciarWeb);
</script>
